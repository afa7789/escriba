<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcritor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Transcritor <span class="badge">WebGPU</span></h1>
        <p class="subtitle">Transcreva áudio localmente no seu navegador</p>

        <div class="section">
            <div class="section-title">Dispositivo</div>
            <div class="device-info">
                <div class="device-badge" id="badgeWasm">
                    <span class="device-dot"></span>
                    <span>WASM (CPU)</span>
                </div>
                <div class="device-badge" id="badgeWebgpu">
                    <span class="device-dot"></span>
                    <span>WebGPU (GPU)</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Modelo</div>
            <div class="model-selector">
                <label for="modelSelect">Selecione:</label>
                <select id="modelSelect">
                    <option value="onnx-community/whisper-tiny">Tiny (39MB - Mais rápido)</option>
                    <option value="onnx-community/whisper-base" selected>Base (74MB - Equilibrado)</option>
                    <option value="onnx-community/whisper-small">Small (241MB - Mais preciso)</option>
                    <option value="onnx-community/whisper-medium.en">Medium EN (769MB - Alta precisão, inglês)</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Idioma</div>
            <div class="model-selector">
                <label for="languageSelect">Selecione:</label>
                <select id="languageSelect">
                    <option value="pt" selected>Português</option>
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="it">Italiano</option>
                    <option value="ja">日本語</option>
                    <option value="zh">中文</option>
                    <option value="ko">한국어</option>
                    <option value="auto">Auto-detectar</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Arquivos</div>
            <div class="button-group" style="margin-bottom: 12px;">
                <button id="recordBtn" class="record-btn">
                    <span id="recordIcon">●</span>
                    <span id="recordText">Gravar Áudio</span>
                    <span id="recordTime" class="record-time"></span>
                </button>
            </div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-text">Clique ou arraste arquivos</div>
                <div class="upload-subtext">MP3, WAV, OGG, FLAC, M4A, MP4</div>
                <input type="file" id="fileInput" accept="audio/*,video/mp4" multiple>
            </div>
        </div>

        <div class="files-list" id="filesList"></div>

        <div class="status" id="status"></div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-label">
                <span id="progressLabel">Inicializando</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="downloads-list" id="downloadsList"></div>
        </div>

        <div class="button-group">
            <button id="transcribeBtn" disabled>Transcrever</button>
            <button id="downloadAllBtn" class="btn-secondary" disabled>Baixar ZIP</button>
            <button id="clearBtn" class="btn-secondary">Limpar</button>
        </div>

        <div class="results-container" id="resultsContainer">
            <div id="resultsList"></div>
            <div class="stats" id="stats"></div>
        </div>
    </div>

    <footer>
        <a href="https://github.com/arthurfa/Escriba" target="_blank" rel="noopener">GitHub - Source Code</a>
    </footer>

    <script type="module" src="src/app.js"></script>
</body>
</html>
