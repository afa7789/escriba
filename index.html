<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcritor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            color-scheme: light dark;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.6;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #ffffff;
                --bg-secondary: #f5f5f5;
                --text-primary: #000000;
                --text-secondary: #666666;
                --border-color: #e0e0e0;
                --input-bg: #ffffff;
                --input-border: #cccccc;
                --button-bg: #000000;
                --button-text: #ffffff;
                --button-hover: #333333;
                --accent: #000000;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #121212;
                --bg-secondary: #1e1e1e;
                --text-primary: #ffffff;
                --text-secondary: #999999;
                --border-color: #333333;
                --input-bg: #1e1e1e;
                --input-border: #444444;
                --button-bg: #ffffff;
                --button-text: #000000;
                --button-hover: #cccccc;
                --accent: #ffffff;
            }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .badge {
            display: inline-block;
            background: var(--accent);
            color: var(--bg-primary);
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .upload-area {
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .upload-area:hover {
            background-color: var(--bg-secondary);
            border-color: var(--text-primary);
        }

        .upload-area.dragover {
            background-color: var(--bg-secondary);
            border-color: var(--text-primary);
        }

        .upload-text {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .upload-subtext {
            color: var(--text-secondary);
            font-size: 13px;
        }

        input[type="file"] {
            display: none;
        }

        .model-selector {
            margin-bottom: 20px;
        }

        .model-selector label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--text-primary);
        }

        .device-info {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .device-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
        }

        .device-badge.active {
            border-color: var(--accent);
            font-weight: 500;
        }

        .device-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .device-badge.active .device-dot {
            background: #22c55e;
        }

        .files-list {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .files-list.active {
            display: block;
            margin-bottom: 20px;
        }

        .file-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item-info {
            flex: 1;
        }

        .file-item-name {
            font-weight: 500;
            margin-bottom: 2px;
            word-break: break-all;
        }

        .file-item-size {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .file-item-status {
            margin-left: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .file-progress {
            width: 60px;
            height: 4px;
            background: var(--bg-secondary);
            border-radius: 2px;
            overflow: hidden;
            margin-left: 10px;
        }

        .file-progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 16px;
            border: 1px solid var(--button-bg);
            border-radius: 4px;
            background-color: var(--button-bg);
            color: var(--button-text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--button-hover);
            border-color: var(--button-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: var(--border-color);
        }

        .status {
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .status.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--text-secondary);
            border-top-color: var(--text-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-container {
            display: none;
            margin-bottom: 20px;
        }

        .progress-container.active {
            display: block;
        }

        .progress-label {
            font-size: 13px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--bg-secondary);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--text-primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .downloads-list {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .record-btn {
            padding: 10px 16px;
            border: 1px solid var(--button-bg);
            border-radius: 4px;
            background-color: var(--button-bg);
            color: var(--button-text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .record-btn.recording {
            background-color: #dc2626;
            border-color: #dc2626;
        }

        .record-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .record-time {
            font-variant-numeric: tabular-nums;
        }

        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .download-item:last-child {
            border-bottom: none;
        }

        .download-name {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .download-size {
            font-variant-numeric: tabular-nums;
        }

        .results-container {
            display: none;
        }

        .results-container.active {
            display: block;
        }

        .copy-all-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        .result-item {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .result-filename {
            font-weight: 500;
            word-break: break-all;
            flex: 1;
            font-size: 14px;
        }

        .result-actions {
            display: flex;
            gap: 8px;
            margin-left: 12px;
        }

        .result-btn {
            padding: 6px 12px;
            font-size: 12px;
            white-space: nowrap;
        }

        .result-text {
            color: var(--text-primary);
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 14px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background-color: var(--bg-secondary);
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            max-height: 400px;
            overflow-y: auto;
        }

        .stats {
            background-color: var(--bg-secondary);
            padding: 12px;
            border-radius: 4px;
            margin-top: 16px;
            font-size: 13px;
            border: 1px solid var(--border-color);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .stats-row:last-child {
            margin-bottom: 0;
        }

        .stats-label {
            color: var(--text-secondary);
        }

        .stats-value {
            font-weight: 500;
        }

        .perf-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .perf-stat {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .perf-stat-value {
            font-size: 20px;
            font-weight: 600;
        }

        .perf-stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 4px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }

            h1 {
                font-size: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .result-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .result-actions {
                margin-left: 0;
                margin-top: 8px;
                width: 100%;
            }

            .result-btn {
                flex: 1;
            }

            .device-info {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Transcritor <span class="badge">WebGPU</span></h1>
        <p class="subtitle">Transcreva áudio localmente no seu navegador</p>

        <div class="section">
            <div class="section-title">Dispositivo</div>
            <div class="device-info">
                <div class="device-badge" id="badgeWasm">
                    <span class="device-dot"></span>
                    <span>WASM (CPU)</span>
                </div>
                <div class="device-badge" id="badgeWebgpu">
                    <span class="device-dot"></span>
                    <span>WebGPU (GPU)</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Modelo</div>
            <div class="model-selector">
                <label for="modelSelect">Selecione:</label>
                <select id="modelSelect">
                    <option value="onnx-community/whisper-tiny">Tiny (39MB - Mais rápido)</option>
                    <option value="onnx-community/whisper-base" selected>Base (74MB - Equilibrado)</option>
                    <option value="onnx-community/whisper-small">Small (241MB - Mais preciso)</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Arquivos</div>
            <div class="button-group" style="margin-bottom: 12px;">
                <button id="recordBtn" class="record-btn">
                    <span id="recordIcon">●</span>
                    <span id="recordText">Gravar Áudio</span>
                    <span id="recordTime" class="record-time"></span>
                </button>
            </div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-text">Clique ou arraste arquivos</div>
                <div class="upload-subtext">MP3, WAV, OGG, FLAC, M4A</div>
                <input type="file" id="fileInput" accept="audio/*" multiple>
            </div>
        </div>

        <div class="files-list" id="filesList"></div>

        <div class="status" id="status"></div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-label">
                <span id="progressLabel">Inicializando</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="downloads-list" id="downloadsList"></div>
        </div>

        <div class="button-group">
            <button id="transcribeBtn" disabled>Transcrever</button>
            <button id="downloadAllBtn" class="btn-secondary" disabled>Baixar ZIP</button>
            <button id="clearBtn" class="btn-secondary">Limpar</button>
        </div>

        <div class="results-container" id="resultsContainer">
            <div id="resultsList"></div>
            <div class="stats" id="stats"></div>
        </div>
    </div>

    <script type="module">
        let worker = null;
        let selectedFiles = [];
        let results = {};
        let isReady = false;
        let currentDevice = 'wasm';
        let timings = {};
        let workers = [];
        let isTranscribing = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        let recordingStartTime = null;
        let recordingTimer = null;
        let recordedBlob = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const filesList = document.getElementById('filesList');
        const transcribeBtn = document.getElementById('transcribeBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearBtn = document.getElementById('clearBtn');
        const status = document.getElementById('status');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const progressLabel = document.getElementById('progressLabel');
        const downloadsList = document.getElementById('downloadsList');
        const modelSelect = document.getElementById('modelSelect');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsList = document.getElementById('resultsList');
        const statsDiv = document.getElementById('stats');
        const badgeWasm = document.getElementById('badgeWasm');
        const badgeWebgpu = document.getElementById('badgeWebgpu');
        const recordBtn = document.getElementById('recordBtn');
        const recordIcon = document.getElementById('recordIcon');
        const recordText = document.getElementById('recordText');
        const recordTime = document.getElementById('recordTime');

        function detectDevice() {
            if (navigator.gpu) {
                currentDevice = 'webgpu';
                badgeWebgpu.classList.add('active');
                badgeWasm.classList.remove('active');
            } else {
                currentDevice = 'wasm';
                badgeWasm.classList.add('active');
                badgeWebgpu.classList.remove('active');
            }
        }

        function handleWorkerMessage(e) {
            const { type, progress, message, error, filename, text, chunks, downloads } = e.data;

            switch (type) {
                case 'status':
                    showStatus(message);
                    break;

                case 'progress':
                    updateProgress(progress);
                    break;

                case 'downloads':
                    renderDownloads(downloads);
                    break;

                case 'ready':
                    isReady = true;
                    showStatus('Pronto');
                    progressContainer.classList.remove('active');
                    downloadsList.innerHTML = '';
                    transcribeBtn.disabled = false;
                    break;

                case 'result':
                    results[filename] = { text, chunks, timing: Date.now() - (timings[filename] || Date.now()) };
                    updateFileStatus(filename, 'done');
                    checkComplete();
                    break;

                case 'error':
                    results[filename || 'unknown'] = { text: `Erro: ${error}`, chunks: null, timing: 0 };
                    updateFileStatus(filename || 'unknown', 'error');
                    checkComplete();
                    break;
            }
        }

        function initWorker() {
            worker = new Worker('./worker.js', { type: 'module' });
            worker.onmessage = handleWorkerMessage;

            worker.onerror = function(e) {
                showStatus(`Erro: ${e.message}`);
                progressContainer.classList.remove('active');
                transcribeBtn.disabled = false;
            };
        }

        function loadModel() {
            isReady = false;
            transcribeBtn.disabled = true;
            progressContainer.classList.add('active');
            updateProgress(0);
            progressLabel.textContent = 'Baixando modelo...';

            worker.postMessage({
                type: 'init',
                data: {
                    model: modelSelect.value,
                    device: currentDevice
                }
            });
        }

        modelSelect.addEventListener('change', () => {
            if (isReady) {
                loadModel();
            }
        });

        uploadArea.addEventListener('click', function() {
            console.log('uploadArea clicked', fileInput);
            fileInput.click();
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        recordBtn.addEventListener('click', async () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                stopRecording();
            } else {
                await startRecording();
            }
        });

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                recordedChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(recordedChunks, { type: 'audio/webm' });
                    const file = new File([recordedBlob], `gravacao-${Date.now()}.webm`, { type: 'audio/webm' });
                    handleFiles([file]);
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                recordingStartTime = Date.now();
                recordBtn.classList.add('recording');
                recordIcon.textContent = '■';
                recordText.textContent = 'Parar';
                
                recordingTimer = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                    const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
                    const secs = (elapsed % 60).toString().padStart(2, '0');
                    recordTime.textContent = `${mins}:${secs}`;
                }, 1000);

            } catch (err) {
                showStatus('Erro ao acessar microfone: ' + err.message);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                clearInterval(recordingTimer);
                recordBtn.classList.remove('recording');
                recordIcon.textContent = '●';
                recordText.textContent = 'Gravar Áudio';
                recordTime.textContent = '';
            }
        }

        function handleFiles(files) {
            const audioFiles = Array.from(files).filter(f => f.type.startsWith('audio/'));

            if (audioFiles.length === 0) {
                showStatus('Selecione arquivos de áudio válidos.');
                return;
            }

            selectedFiles = audioFiles;
            renderFilesList();
            transcribeBtn.disabled = !isReady;
            clearStatus();
        }

        function renderFilesList() {
            filesList.innerHTML = '';
            selectedFiles.forEach((file) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.id = `file-${file.name.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const existingResult = results[file.name];
                let statusHtml = '○';
                
                if (existingResult) {
                    statusHtml = existingResult.text.startsWith('Erro:') ? '✗' : '✓';
                }

                item.innerHTML = `
                    <div class="file-item-info">
                        <div class="file-item-name">${file.name}</div>
                        <div class="file-item-size">${(file.size / 1024 / 1024).toFixed(2)} MB</div>
                    </div>
                    <div class="file-item-status" id="status-${file.name.replace(/[^a-zA-Z0-9]/g, '_')}">${statusHtml}</div>
                    <div class="file-progress">
                        <div class="file-progress-fill" id="progress-${file.name.replace(/[^a-zA-Z0-9]/g, '_')}"></div>
                    </div>
                `;
                filesList.appendChild(item);
            });
            filesList.classList.add('active');
        }

        function updateFileStatus(filename, status) {
            const safeName = filename.replace(/[^a-zA-Z0-9]/g, '_');
            const statusEl = document.getElementById(`status-${safeName}`);
            const progressEl = document.getElementById(`progress-${safeName}`);
            
            if (statusEl) {
                statusEl.textContent = status === 'done' ? '✓' : status === 'error' ? '✗' : '...';
            }
            if (progressEl) {
                progressEl.style.width = status === 'done' ? '100%' : status === 'processing' ? '50%' : '0%';
            }
        }

        transcribeBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0 || !isReady) return;
            if (isTranscribing) return;
            isTranscribing = true;

            transcribeBtn.disabled = true;
            downloadAllBtn.disabled = true;
            progressContainer.classList.add('active');
            resultsContainer.classList.remove('active');
            results = {};

            workers.forEach(w => w.terminate());
            workers = [];

            const numWorkers = Math.min(navigator.hardwareConcurrency || 4, selectedFiles.length);
            const workerReadyPromises = [];

            for (let i = 0; i < numWorkers; i++) {
                const w = new Worker('./worker.js', { type: 'module' });
                w.onmessage = handleWorkerMessage;
                workers.push(w);

                const readyPromise = new Promise((resolve) => {
                    const handler = (e) => {
                        if (e.data.type === 'ready') {
                            w.removeEventListener('message', handler);
                            resolve();
                        }
                    };
                    w.addEventListener('message', handler);
                    w.postMessage({
                        type: 'init',
                        data: {
                            model: modelSelect.value,
                            device: currentDevice
                        }
                    });
                });
                workerReadyPromises.push(readyPromise);
            }

            showStatus('Carregando modelos...');
            await Promise.all(workerReadyPromises);
            showStatus('Modelos prontos!');

            const audioContext = new AudioContext();

            async function prepareAudio(file) {
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
                const channelData = audioBuffer.getChannelData(0);
                
                const offlineCtx = new OfflineAudioContext(1, channelData.length, 16000);
                const offlineSource = offlineCtx.createBufferSource();
                const tempBuffer = offlineCtx.createBuffer(1, channelData.length, audioBuffer.sampleRate);
                tempBuffer.copyToChannel(channelData, 0);
                offlineSource.buffer = tempBuffer;
                offlineSource.connect(offlineCtx.destination);
                offlineSource.start();
                
                const renderedBuffer = await offlineCtx.startRendering();
                return Float32Array.from(renderedBuffer.getChannelData(0));
            }

            async function sendToWorker(worker, file, audioData) {
                return new Promise((resolve) => {
                    const timeout = setTimeout(() => {
                        resolve();
                    }, 300000);

                    const handler = (e) => {
                        if (e.data.filename === file.name) {
                            worker.removeEventListener('message', handler);
                            clearTimeout(timeout);
                            resolve();
                        }
                    };
                    worker.addEventListener('message', handler);

                    worker.postMessage({
                        type: 'transcribe',
                        data: {
                            filename: file.name,
                            audio: audioData
                        }
                    }, [audioData.buffer]);
                });
            }

            const totalFiles = selectedFiles.length;
            let completedFiles = 0;
            let nextFileIndex = 0;

            async function processNextFile() {
                while (nextFileIndex < totalFiles) {
                    const workerIndex = nextFileIndex % numWorkers;
                    const worker = workers[workerIndex];
                    const file = selectedFiles[nextFileIndex];
                    nextFileIndex++;
                    
                    showStatus(`Processando ${completedFiles + 1}/${totalFiles}: ${file.name}`);
                    progressLabel.textContent = `Arquivo ${completedFiles + 1}/${totalFiles}`;
                    updateFileStatus(file.name, 'processing');
                    timings[file.name] = Date.now();

                    try {
                        const audioData = await prepareAudio(file);
                        await sendToWorker(worker, file, audioData);
                        completedFiles++;
                        updateProgress(completedFiles / totalFiles);
                    } catch (error) {
                        results[file.name] = { text: `Erro: ${error.message}`, chunks: null, timing: 0 };
                        updateFileStatus(file.name, 'error');
                    }
                }
            }

            const parallelJobs = [];
            for (let i = 0; i < numWorkers; i++) {
                parallelJobs.push(processNextFile());
            }

            await Promise.all(parallelJobs);

            workers.forEach(w => w.terminate());
            await audioContext.close();
            renderResults();
            showStatus('Concluído.');
            downloadAllBtn.disabled = false;
            transcribeBtn.disabled = false;
            progressContainer.classList.remove('active');
            isTranscribing = false;
        });

        function renderResults() {
            resultsList.innerHTML = '';
            let totalChars = 0;
            let totalTime = 0;

            const hasMultiple = Object.keys(results).length > 1;
            let copyAllButtonsHtml = '';
            if (hasMultiple) {
                copyAllButtonsHtml = `<div class="copy-all-container">
                    <button class="result-btn" onclick="copyAllTranscriptions()">Copiar Todos</button>
                </div>`;
            }

            resultsList.innerHTML = copyAllButtonsHtml;

            Object.entries(results).forEach(([filename, data]) => {
                const isError = data.text.startsWith('Erro:');
                const charCount = isError ? 0 : data.text.length;
                totalChars += charCount;
                totalTime += data.timing || 0;

                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div class="result-header">
                        <div class="result-filename">${filename}</div>
                        <div class="result-actions">
                            <button class="result-btn" onclick="downloadFile('${filename.replace(/'/g, "\\'")}')">Baixar</button>
                            <button class="result-btn btn-secondary" onclick="copyToClipboard('${filename.replace(/'/g, "\\'")}')">Copiar</button>
                        </div>
                    </div>
                    <div class="result-text">${escapeHtml(data.text)}</div>
                `;
                resultsList.appendChild(item);
            });

            if (hasMultiple) {
                const copyAllEnd = document.createElement('div');
                copyAllEnd.className = 'copy-all-container';
                copyAllEnd.style.marginTop = '12px';
                copyAllEnd.innerHTML = `<button class="result-btn" onclick="copyAllTranscriptions()">Copiar Todos</button>`;
                resultsList.appendChild(copyAllEnd);
            }

            const avgTime = totalTime / Object.keys(results).length;
            const totalDuration = selectedFiles.reduce((sum, f) => sum + (timings[f.name] ? 0 : 0), 0);

            statsDiv.innerHTML = `
                <div class="stats-row">
                    <span class="stats-label">Arquivos:</span>
                    <span class="stats-value">${selectedFiles.length}</span>
                </div>
                <div class="stats-row">
                    <span class="stats-label">Caracteres:</span>
                    <span class="stats-value">${totalChars.toLocaleString()}</span>
                </div>
                <div class="perf-stats">
                    <div class="perf-stat">
                        <div class="perf-stat-value">${currentDevice.toUpperCase()}</div>
                        <div class="perf-stat-label">Backend</div>
                    </div>
                    <div class="perf-stat">
                        <div class="perf-stat-value">${avgTime > 0 ? (avgTime / 1000).toFixed(1) + 's' : '-'}</div>
                        <div class="perf-stat-label">Tempo médio</div>
                    </div>
                    <div class="perf-stat">
                        <div class="perf-stat-value">${Object.keys(results).length}</div>
                        <div class="perf-stat-label">Processados</div>
                    </div>
                </div>
            `;

            resultsContainer.classList.add('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function checkComplete() {
            const doneCount = Object.keys(results).length;
            if (doneCount === selectedFiles.length) {
                renderResults();
            }
        }

        window.downloadFile = (filename) => {
            const data = results[filename];
            if (!data) return;

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(data.text));
            element.setAttribute('download', `${filename.replace(/\.[^/.]+$/, '')}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        };

        window.copyToClipboard = (filename) => {
            const data = results[filename];
            if (!data) return;

            navigator.clipboard.writeText(data.text).then(() => {
                alert('Copiado para a área de transferência!');
            });
        };

        window.copyAllTranscriptions = () => {
            const allText = Object.entries(results).map(([filename, data]) => {
                return `=== ${filename} ===\n${data.text}`;
            }).join('\n\n');

            navigator.clipboard.writeText(allText).then(() => {
                alert('Todas as transcrições copiadas!');
            });
        };

        downloadAllBtn.addEventListener('click', async () => {
            try {
                if (Object.keys(results).length === 0) {
                    showStatus('Nenhuma transcrição disponível para baixar.');
                    return;
                }

                const { default: JSZip } = await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm');
                const zip = new JSZip();

                Object.entries(results).forEach(([filename, data]) => {
                    const txtName = `${filename.replace(/\.[^/.]+$/, '')}.txt`;
                    zip.file(txtName, data.text);
                });

                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `transcricoes-${Date.now()}.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showStatus('ZIP baixado com sucesso!');
            } catch (err) {
                console.error('Erro ao gerar ZIP:', err);
                showStatus('Erro ao baixar ZIP: ' + err.message);
            }
        });

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            results = {};
            timings = {};
            fileInput.value = '';
            filesList.classList.remove('active');
            resultsContainer.classList.remove('active');
            transcribeBtn.disabled = true;
            downloadAllBtn.disabled = true;
            clearStatus();
            progressContainer.classList.remove('active');
        });

        function updateProgress(progress) {
            const percent = Math.round(progress * 100);
            progressFill.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
        }

        function renderDownloads(downloads) {
            const entries = Object.entries(downloads);
            if (entries.length === 0) {
                downloadsList.innerHTML = '';
                return;
            }
            downloadsList.innerHTML = entries.map(([file, data]) => {
                const name = file.split('/').pop();
                const loaded = (data.loaded / 1024 / 1024).toFixed(1);
                const total = (data.total / 1024 / 1024).toFixed(1);
                const pct = data.total > 0 ? Math.round(data.loaded / data.total * 100) : 0;
                return `<div class="download-item">
                    <span class="download-name" title="${file}">${name}</span>
                    <span class="download-size">${loaded} / ${total} MB (${pct}%)</span>
                </div>`;
            }).join('');
        }

        function showStatus(message) {
            status.textContent = message;
            status.classList.add('active');
        }

        function clearStatus() {
            status.classList.remove('active');
            status.textContent = '';
        }

        detectDevice();
        initWorker();
        loadModel();
    </script>
</body>
</html>
