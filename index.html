<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcritor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            color-scheme: light dark;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.6;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #ffffff;
                --bg-secondary: #f5f5f5;
                --text-primary: #000000;
                --text-secondary: #666666;
                --border-color: #e0e0e0;
                --input-bg: #ffffff;
                --input-border: #cccccc;
                --button-bg: #000000;
                --button-text: #ffffff;
                --button-hover: #333333;
                --accent: #000000;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #121212;
                --bg-secondary: #1e1e1e;
                --text-primary: #ffffff;
                --text-secondary: #999999;
                --border-color: #333333;
                --input-bg: #1e1e1e;
                --input-border: #444444;
                --button-bg: #ffffff;
                --button-text: #000000;
                --button-hover: #cccccc;
                --accent: #ffffff;
            }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .upload-area {
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .upload-area:hover {
            background-color: var(--bg-secondary);
            border-color: var(--text-primary);
        }

        .upload-area.dragover {
            background-color: var(--bg-secondary);
            border-color: var(--text-primary);
        }

        .upload-text {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .upload-subtext {
            color: var(--text-secondary);
            font-size: 13px;
        }

        input[type="file"] {
            display: none;
        }

        .model-selector {
            margin-bottom: 20px;
        }

        .model-selector label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--text-primary);
        }

        .files-list {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .files-list.active {
            display: block;
            margin-bottom: 20px;
        }

        .file-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item-info {
            flex: 1;
        }

        .file-item-name {
            font-weight: 500;
            margin-bottom: 2px;
            word-break: break-all;
        }

        .file-item-size {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .file-item-status {
            margin-left: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 16px;
            border: 1px solid var(--button-bg);
            border-radius: 4px;
            background-color: var(--button-bg);
            color: var(--button-text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--button-hover);
            border-color: var(--button-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: var(--border-color);
        }

        .status {
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .status.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--text-secondary);
            border-top-color: var(--text-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-container {
            display: none;
            margin-bottom: 20px;
        }

        .progress-container.active {
            display: block;
        }

        .progress-label {
            font-size: 13px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--bg-secondary);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--text-primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .results-container {
            display: none;
        }

        .results-container.active {
            display: block;
        }

        .result-item {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .result-filename {
            font-weight: 500;
            word-break: break-all;
            flex: 1;
            font-size: 14px;
        }

        .result-actions {
            display: flex;
            gap: 8px;
            margin-left: 12px;
        }

        .result-btn {
            padding: 6px 12px;
            font-size: 12px;
            white-space: nowrap;
        }

        .result-text {
            color: var(--text-primary);
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 14px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background-color: var(--bg-secondary);
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            max-height: 400px;
            overflow-y: auto;
        }

        .stats {
            background-color: var(--bg-secondary);
            padding: 12px;
            border-radius: 4px;
            margin-top: 16px;
            font-size: 13px;
            border: 1px solid var(--border-color);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .stats-row:last-child {
            margin-bottom: 0;
        }

        .stats-label {
            color: var(--text-secondary);
        }

        .stats-value {
            font-weight: 500;
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }

            h1 {
                font-size: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .result-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .result-actions {
                margin-left: 0;
                margin-top: 8px;
                width: 100%;
            }

            .result-btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Transcritor</h1>
        <p class="subtitle">Transcreva áudio localmente no seu navegador</p>

        <div class="section">
            <div class="section-title">Modelo</div>
            <div class="model-selector">
                <label for="modelSelect">Selecione:</label>
                <select id="modelSelect">
                    <option value="tiny">Tiny (40MB - Mais rápido)</option>
                    <option value="base" selected>Base (75MB - Equilibrado)</option>
                    <option value="small">Small (140MB - Mais preciso)</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Arquivos</div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-text">Clique ou arraste arquivos</div>
                <div class="upload-subtext">MP3, WAV, OGG, FLAC, M4A</div>
                <input type="file" id="fileInput" accept="audio/*" multiple>
            </div>
        </div>

        <div class="files-list" id="filesList"></div>

        <div class="status" id="status"></div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-label">
                <span id="progressLabel">Processando</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="button-group">
            <button id="transcribeBtn" disabled>Transcrever</button>
            <button id="downloadAllBtn" class="btn-secondary" disabled>Baixar ZIP</button>
            <button id="clearBtn" class="btn-secondary">Limpar</button>
        </div>

        <div class="results-container" id="resultsContainer">
            <div id="resultsList"></div>
            <div class="stats" id="stats"></div>
        </div>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

        let selectedFiles = [];
        let results = {};
        let transcriber = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const filesList = document.getElementById('filesList');
        const transcribeBtn = document.getElementById('transcribeBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearBtn = document.getElementById('clearBtn');
        const status = document.getElementById('status');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const progressLabel = document.getElementById('progressLabel');
        const modelSelect = document.getElementById('modelSelect');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsList = document.getElementById('resultsList');
        const statsDiv = document.getElementById('stats');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            const audioFiles = Array.from(files).filter(f => f.type.startsWith('audio/'));

            if (audioFiles.length === 0) {
                showStatus('Selecione arquivos de áudio válidos.');
                return;
            }

            selectedFiles = audioFiles;
            renderFilesList();
            transcribeBtn.disabled = false;
            clearStatus();
        }

        function renderFilesList() {
            filesList.innerHTML = '';
            selectedFiles.forEach((file) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                const isDone = results[file.name];
                const statusText = isDone ? '✓' : '○';
                item.innerHTML = `
                    <div class="file-item-info">
                        <div class="file-item-name">${file.name}</div>
                        <div class="file-item-size">${(file.size / 1024 / 1024).toFixed(2)} MB</div>
                    </div>
                    <div class="file-item-status">${statusText}</div>
                `;
                filesList.appendChild(item);
            });
            filesList.classList.add('active');
        }

        transcribeBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            transcribeBtn.disabled = true;
            downloadAllBtn.disabled = true;
            progressContainer.classList.add('active');
            resultsContainer.classList.remove('active');
            results = {};

            try {
                showStatus(`Carregando modelo ${modelSelect.value}...`);

                if (!transcriber) {
                    transcriber = await pipeline(
                        'automatic-speech-recognition',
                        `Xenova/whisper-${modelSelect.value}`,
                        { progress_callback: updateModelProgress }
                    );
                }

                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    showStatus(`Processando ${i + 1}/${selectedFiles.length}: ${file.name}`);
                    progressLabel.textContent = `Arquivo ${i + 1}/${selectedFiles.length}`;

                    try {
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await transcriber(arrayBuffer);
                        results[file.name] = result.text;
                    } catch (error) {
                        results[file.name] = `Erro: ${error.message}`;
                    }

                    updateProgress((i + 1) / selectedFiles.length);
                }

                renderResults();
                showStatus('Concluído.');
                downloadAllBtn.disabled = false;
            } catch (error) {
                console.error('Erro:', error);
                showStatus(`Erro: ${error.message}`);
            } finally {
                transcribeBtn.disabled = false;
                progressContainer.classList.remove('active');
            }
        });

        function renderResults() {
            resultsList.innerHTML = '';
            let totalChars = 0;

            Object.entries(results).forEach(([filename, text]) => {
                const isError = text.startsWith('Erro:');
                const charCount = isError ? 0 : text.length;
                totalChars += charCount;

                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div class="result-header">
                        <div class="result-filename">${filename}</div>
                        <div class="result-actions">
                            <button class="result-btn" onclick="downloadFile('${filename.replace(/'/g, "\\'")}')">Baixar</button>
                            <button class="result-btn btn-secondary" onclick="copyToClipboard('${filename.replace(/'/g, "\\'")}')">Copiar</button>
                        </div>
                    </div>
                    <div class="result-text">${text}</div>
                `;
                resultsList.appendChild(item);
            });

            statsDiv.innerHTML = `
                <div class="stats-row">
                    <span class="stats-label">Arquivos:</span>
                    <span class="stats-value">${selectedFiles.length}</span>
                </div>
                <div class="stats-row">
                    <span class="stats-label">Caracteres:</span>
                    <span class="stats-value">${totalChars.toLocaleString()}</span>
                </div>
            `;

            resultsContainer.classList.add('active');
        }

        window.downloadFile = (filename) => {
            const text = results[filename];
            if (!text) return;

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', `${filename.replace(/\.[^/.]+$/, '')}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        };

        window.copyToClipboard = (filename) => {
            const text = results[filename];
            if (!text) return;

            navigator.clipboard.writeText(text).then(() => {
                alert('Copiado para a área de transferência!');
            });
        };

        downloadAllBtn.addEventListener('click', async () => {
            const { default: JSZip } = await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm');
            const zip = new JSZip();

            Object.entries(results).forEach(([filename, text]) => {
                const txtName = `${filename.replace(/\.[^/.]+$/, '')}.txt`;
                zip.file(txtName, text);
            });

            const blob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `transcricoes.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            results = {};
            transcriber = null;
            fileInput.value = '';
            filesList.classList.remove('active');
            resultsContainer.classList.remove('active');
            transcribeBtn.disabled = true;
            downloadAllBtn.disabled = true;
            clearStatus();
            progressContainer.classList.remove('active');
        });

        function updateModelProgress(progress) {
            const percent = Math.round(progress * 100);
            progressFill.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
        }

        function updateProgress(progress) {
            const percent = Math.round(progress * 100);
            progressFill.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
        }

        function showStatus(message) {
            status.textContent = message;
            status.classList.add('active');
        }

        function clearStatus() {
            status.classList.remove('active');
            status.textContent = '';
        }
    </script>
</body>
</html>
